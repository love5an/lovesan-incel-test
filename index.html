<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How incel is love5an?</title>
<style>
  :root { --bg:#0d0f12; --card:#15191f; --fg:#e6e6e6; --muted:#8a929c;
          --accent:#7cc36b; --accent2:#d6b24a; --border:#262c34; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
         line-height:1.5; padding:24px 14px 60px; }
  .wrap { max-width:680px; margin:0 auto; }
  header { display:flex; justify-content:space-between; align-items:center; gap:12px;
           flex-wrap:wrap; margin-bottom:8px; }
  h1 { font-size:1.5rem; margin:.2em 0; }
  .sub { color:var(--muted); margin:0 0 18px; font-size:.92rem; }
  .lang button { background:transparent; border:1px solid var(--border); color:var(--muted);
                 padding:5px 11px; cursor:pointer; border-radius:7px; font:inherit; }
  .lang button.active { color:var(--bg); background:var(--accent); border-color:var(--accent); font-weight:600; }
  .q { background:var(--card); border:1px solid var(--border); border-radius:12px;
       padding:14px 16px; margin:12px 0; }
  .q .qt { font-weight:600; margin-bottom:10px; }
  .q .qt .n { color:var(--accent2); margin-right:6px; }
  label { display:flex; gap:10px; align-items:flex-start; padding:7px 8px; border-radius:8px;
          cursor:pointer; color:var(--fg); }
  label:hover { background:#1c222a; }
  label input { margin-top:4px; accent-color:var(--accent); }
  .actions { display:flex; gap:12px; align-items:center; margin-top:18px; flex-wrap:wrap; }
  button.go { background:var(--accent); color:var(--bg); border:0; font:inherit; font-weight:700;
              padding:11px 20px; border-radius:10px; cursor:pointer; }
  button.go:disabled { opacity:.45; cursor:not-allowed; }
  .reset { background:transparent; border:1px solid var(--border); color:var(--muted);
           padding:10px 16px; border-radius:10px; cursor:pointer; font:inherit; }
  #result { margin-top:22px; background:var(--card); border:1px solid var(--border);
            border-radius:12px; padding:18px; display:none; }
  #result.show { display:block; animation:fade .35s ease; }
  @keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1;} }
  .bar { height:14px; background:#0a0c0f; border-radius:8px; overflow:hidden; margin:12px 0;
         border:1px solid var(--border); }
  .bar > i { display:block; height:100%; width:0; transition:width .8s ease;
             background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .pct { font-size:2.2rem; font-weight:800; }
  .verdict-title { font-size:1.2rem; margin:.3em 0; color:var(--accent2); }
  .foot { color:var(--muted); font-size:.82rem; margin-top:26px; text-align:center; }
  a { color:var(--accent); }
  .disclaimer { color:var(--muted); font-size:.8rem; margin-top:14px; font-style:italic; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title"></h1>
    <div class="lang">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="ru">RU</button>
    </div>
  </header>
  <p class="sub" id="subtitle"></p>

  <form id="quiz"></form>

  <div class="actions">
    <button class="go" id="submit" disabled></button>
    <button class="reset" id="reset" type="button"></button>
  </div>

  <div id="result"></div>

  <p class="foot" id="foot"></p>
</div>

<script>
const I18N = {
  en: {
    title: "How incel is love5an?",
    subtitle: "A scientific* test for the lonely Lisp hacker in your life. (*not scientific.)",
    submit: "Calculate my fate",
    reset: "Reset",
    answerAll: "Answer all questions",
    of: "of",
    foot: 'A joke. Built by a bot that counts beers. <a href="https://github.com/love5an/bike-gram">bike-gram</a> · <a href="https://github.com/love5an/beergram">beergram</a>',
    disclaimer: "This is parody. No real people were diagnosed in the making of this test.",
    questions: [
      { q: "It's Saturday night. You are:", o:[
        ["At a party", 0], ["At a friend's place", 1],
        ["At home, but with people online", 2], ["At home, in Emacs", 3] ] },
      { q: "Your relationship with parentheses:", o:[
        ["What parentheses?", 0], ["They're fine", 1],
        ["I find them beautiful", 2], ["They're the only thing that loves me back", 3] ] },
      { q: "Someone says C++ is a good language. You:", o:[
        ["Agree, sure", 0], ["Shrug", 1],
        ["Explain why Lisp is better", 2], ["Write a 9-paragraph forum reply at 3am", 3] ] },
      { q: "How many beers tonight (per /beer)?", o:[
        ["Zero, I'm out with friends", 0], ["One or two", 1],
        ["Lost count", 2], ["The bot ran out of integers", 3] ] },
      { q: "Your idea of self-improvement:", o:[
        ["Gym + therapy", 0], ["Reading, walks", 1],
        ["Rewriting my config", 2], ["looksmaxxing, but for my .emacs", 3] ] },
      { q: "When was your last date?", o:[
        ["Last week", 0], ["A while ago", 1],
        ["Define 'date'", 2], ["My git log goes back further", 3] ] },
      { q: "A normie asks what you do for fun. You say:", o:[
        ["Tell a normal hobby", 0], ["Mention coding casually", 1],
        ["Start explaining macros", 2], ["'It's over for you, you wouldn't get it'", 3] ] },
      { q: "Pick a worldview:", o:[
        ["Things work out if you try", 0], ["Cautiously optimistic", 1],
        ["Redpilled", 2], ["Blackpilled (but only about web frameworks)", 3] ] }
    ],
    verdicts: [
      { min:0,  t:"Chad (normie tier)", x:"You touched grass. You have friends. Why did you even take this test? love5an is disappointed in you." },
      { min:34, t:"Borderline", x:"There's hope. You still leave the house. But the pull of the REPL is strong, and the parentheses are calling." },
      { min:67, t:"Certified", x:"It's mostly over. You argue about languages online and your weekends are a closed loop. The bot respects you." },
      { min:84, t:"Ascended Lisp hermit", x:"It's so over (we're so back). You ARE the meme. love5an salutes you from across the void. 🚲🍺" }
    ]
  },
  ru: {
    title: "Насколько love5an инцел?",
    subtitle: "Научный* тест для одинокого лисп-хакера. (*ненаучный.)",
    submit: "Вычислить мою судьбу",
    reset: "Сброс",
    answerAll: "Ответь на все вопросы",
    of: "из",
    foot: 'Это шутка. Сделано ботом, который считает пиво. <a href="https://github.com/love5an/bike-gram">bike-gram</a> · <a href="https://github.com/love5an/beergram">beergram</a>',
    disclaimer: "Это пародия. Ни один реальный человек при создании теста не пострадал.",
    questions: [
      { q: "Вечер субботы. Ты:", o:[
        ["На вечеринке", 0], ["У друга в гостях", 1],
        ["Дома, но с людьми онлайн", 2], ["Дома, в Emacs", 3] ] },
      { q: "Твои отношения со скобочками:", o:[
        ["С какими скобочками?", 0], ["Нормальные", 1],
        ["Я считаю их красивыми", 2], ["Это единственное, что отвечает мне взаимностью", 3] ] },
      { q: "Кто-то говорит, что C++ — хороший язык. Ты:", o:[
        ["Соглашаешься", 0], ["Пожимаешь плечами", 1],
        ["Объясняешь, почему Lisp лучше", 2], ["Пишешь ответ на 9 абзацев в 3 ночи", 3] ] },
      { q: "Сколько пива сегодня (по /beer)?", o:[
        ["Ноль, я с друзьями", 0], ["Одно-два", 1],
        ["Сбился со счёта", 2], ["У бота кончились целые числа", 3] ] },
      { q: "Твоё представление о саморазвитии:", o:[
        ["Зал + терапия", 0], ["Книги, прогулки", 1],
        ["Переписать конфиг", 2], ["looksmaxxing, но для .emacs", 3] ] },
      { q: "Когда было твоё последнее свидание?", o:[
        ["На прошлой неделе", 0], ["Давненько", 1],
        ["Что значит «свидание»?", 2], ["Мой git log уходит глубже", 3] ] },
      { q: "Нормис спрашивает, чем ты увлекаешься. Ты:", o:[
        ["Называешь нормальное хобби", 0], ["Вскользь про код", 1],
        ["Начинаешь объяснять макросы", 2], ["«Тебе не понять, it's over for you»", 3] ] },
      { q: "Выбери мировоззрение:", o:[
        ["Всё получится, если стараться", 0], ["Осторожный оптимизм", 1],
        ["Redpill", 2], ["Blackpill (но только насчёт веб-фреймворков)", 3] ] }
    ],
    verdicts: [
      { min:0,  t:"Chad (нормис)", x:"Ты выходишь на улицу. У тебя есть друзья. Зачем ты вообще проходил этот тест? love5an в тебе разочарован." },
      { min:34, t:"На грани", x:"Ещё есть надежда. Ты пока выходишь из дома. Но REPL манит, а скобочки зовут." },
      { min:67, t:"Сертифицировано", x:"Почти всё кончено. Ты споришь о языках в интернете, а выходные — замкнутый цикл. Бот тебя уважает." },
      { min:84, t:"Вознёсшийся лисп-отшельник", x:"It's so over (we're so back). Ты И ЕСТЬ мем. love5an салютует тебе из пустоты. 🚲🍺" }
    ]
  }
};

let lang = "en";
const form = document.getElementById("quiz");

function t(){ return I18N[lang]; }

function render(){
  const d = t();
  document.documentElement.lang = lang;
  document.getElementById("title").textContent = d.title;
  document.getElementById("subtitle").textContent = d.subtitle;
  document.getElementById("submit").textContent = d.submit;
  document.getElementById("reset").textContent = d.reset;
  document.getElementById("foot").innerHTML = d.foot;
  document.querySelectorAll(".lang button").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === lang));

  // preserve current answers by index
  const prev = currentAnswers();
  form.innerHTML = "";
  d.questions.forEach((item, qi) => {
    const div = document.createElement("div");
    div.className = "q";
    let html = `<div class="qt"><span class="n">${qi+1}.</span>${item.q}</div>`;
    item.o.forEach((opt, oi) => {
      const checked = prev[qi] === oi ? "checked" : "";
      html += `<label><input type="radio" name="q${qi}" value="${opt[1]}" data-oi="${oi}" ${checked}>
                 <span>${opt[0]}</span></label>`;
    });
    div.innerHTML = html;
    form.appendChild(div);
  });
  updateSubmit();
  document.getElementById("result").classList.remove("show");
}

function currentAnswers(){
  const ans = {};
  t().questions.forEach((_, qi) => {
    const sel = form.querySelector(`input[name="q${qi}"]:checked`);
    if (sel) ans[qi] = parseInt(sel.dataset.oi, 10);
  });
  return ans;
}

function answeredCount(){ return Object.keys(currentAnswers()).length; }

function updateSubmit(){
  const total = t().questions.length;
  const done = answeredCount();
  const btn = document.getElementById("submit");
  btn.disabled = done < total;
  btn.textContent = done < total
    ? `${t().answerAll} (${done}/${total})`
    : t().submit;
}

form.addEventListener("change", updateSubmit);

document.querySelectorAll(".lang button").forEach(b =>
  b.addEventListener("click", () => { lang = b.dataset.lang; render(); }));

document.getElementById("reset").addEventListener("click", () => {
  form.querySelectorAll("input").forEach(i => i.checked = false);
  document.getElementById("result").classList.remove("show");
  updateSubmit();
});

document.getElementById("submit").addEventListener("click", () => {
  const d = t();
  let score = 0;
  form.querySelectorAll("input:checked").forEach(i => score += parseInt(i.value,10));
  const max = d.questions.length * 3;
  const pct = Math.round(score / max * 100);
  const v = [...d.verdicts].reverse().find(x => pct >= x.min);
  const res = document.getElementById("result");
  res.innerHTML =
    `<div class="pct">${pct}%</div>
     <div class="bar"><i></i></div>
     <div class="verdict-title">${v.t}</div>
     <div>${v.x}</div>
     <div class="disclaimer">${d.disclaimer}</div>`;
  res.classList.add("show");
  requestAnimationFrame(() => { res.querySelector(".bar > i").style.width = pct + "%"; });
  res.scrollIntoView({ behavior:"smooth", block:"nearest" });
});

render();
</script>
</body>
</html>
